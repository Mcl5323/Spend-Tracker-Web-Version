<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spend Tracker - Login</title>
    <style>
        :root {
            font-family: Arial, sans-serif;
            color: #333;
            background: #f4f7fb;
        }
        * {
            box-sizing: border-box;
        }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 420px;
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 45px rgba(35, 35, 90, 0.12);
            overflow: hidden;
        }
        .brand {
            padding: 32px 24px 16px;
            text-align: center;
            background: linear-gradient(135deg, #2e7be5, #1e3a8a);
            color: white;
        }
        .brand h1 {
            margin: 0;
            font-size: 28px;
            letter-spacing: 0.02em;
        }
        .brand p {
            margin: 8px 0 0;
            font-size: 14px;
            opacity: 0.9;
        }
        .form-switch {
            display: flex;
            background: #f1f5f9;
            margin: 20px;
            border-radius: 999px;
            overflow: hidden;
        }
        .form-switch button {
            flex: 1;
            border: none;
            padding: 14px 0;
            font-size: 14px;
            cursor: pointer;
            background: transparent;
            transition: background 0.25s ease;
        }
        .form-switch button.active {
            background: white;
            color: #1d4ed8;
            font-weight: 700;
        }
        .form-content {
            padding: 0 24px 24px;
        }
        form {
            display: grid;
            gap: 16px;
        }
        label {
            font-size: 14px;
            margin-bottom: 6px;
            display: block;
        }
        input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
        }
        .submit-button {
            background: #2563eb;
            border: none;
            padding: 14px;
            color: white;
            font-size: 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        .submit-button:hover {
            background: #1d4ed8;
        }
        .hint {
            text-align: center;
            color: #64748b;
            font-size: 14px;
        }
        .hint a {
            color: #2563eb;
            text-decoration: none;
        }
        .alert {
            padding: 12px 16px;
            border-radius: 12px;
            background: #eef2ff;
            color: #1e3a8a;
            border: 1px solid #c7d2fe;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="brand">
            <h1>Spend Tracker</h1>
            <p>Track your expenses, manage budgets, and stay on top of your money.</p>
        </div>
        <div class="form-switch">
            <button id="loginTab" class="active" type="button">Login</button>
            <button id="signupTab" type="button">Sign Up</button>
        </div>
        <div class="form-content">
            <div id="alert" class="alert" style="display:none;"></div>
            <form id="loginForm">
                <div>
                    <label for="loginEmail">Email</label>
                    <input id="loginEmail" type="email" placeholder="you@example.com" required>
                </div>
                <div>
                    <label for="loginPassword">Password</label>
                    <input id="loginPassword" type="password" placeholder="********" required>
                </div>
                <button class="submit-button" type="submit">Login</button>
                <p class="hint">New here? <a href="#" id="switchToSignup">Create an account</a></p>
            </form>
            <form id="signupForm" style="display:none;">
                <div>
                    <label for="signupName">Full Name</label>
                    <input id="signupName" type="text" placeholder="Your name" required>
                </div>
                <div>
                    <label for="signupEmail">Email</label>
                    <input id="signupEmail" type="email" placeholder="you@example.com" required>
                </div>
                <div>
                    <label for="signupPassword">Password</label>
                    <input id="signupPassword" type="password" placeholder="Create a password" required>
                </div>
                <button class="submit-button" type="submit">Sign Up</button>
                <p class="hint">Already registered? <a href="#" id="switchToLogin">Log in instead</a></p>
            </form>
        </div>
    </div>
    <script>
        const loginTab = document.getElementById('loginTab');
        const signupTab = document.getElementById('signupTab');
        const loginForm = document.getElementById('loginForm');
        const signupForm = document.getElementById('signupForm');
        const switchToSignup = document.getElementById('switchToSignup');
        const switchToLogin = document.getElementById('switchToLogin');
        const alertBox = document.getElementById('alert');

        function showAlert(message) {
            alertBox.textContent = message;
            alertBox.style.display = 'block';
            setTimeout(() => alertBox.style.display = 'none', 4000);
        }

        function setActiveTab(tab) {
            if (tab === 'login') {
                loginTab.classList.add('active');
                signupTab.classList.remove('active');
                loginForm.style.display = 'grid';
                signupForm.style.display = 'none';
            } else {
                signupTab.classList.add('active');
                loginTab.classList.remove('active');
                signupForm.style.display = 'grid';
                loginForm.style.display = 'none';
            }
            alertBox.style.display = 'none';
        }

        loginTab.addEventListener('click', () => setActiveTab('login'));
        signupTab.addEventListener('click', () => setActiveTab('signup'));
        switchToSignup.addEventListener('click', event => {
            event.preventDefault();
            setActiveTab('signup');
        });
        switchToLogin.addEventListener('click', event => {
            event.preventDefault();
            setActiveTab('login');
        });

        loginForm.addEventListener('submit', event => {
            event.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            if (!email) {
                showAlert('Please enter your email and password.');
                return;
            }
            showAlert('Login submitted. This is a demo page only.');
        });

        signupForm.addEventListener('submit', event => {
            event.preventDefault();
            const name = document.getElementById('signupName').value.trim();
            if (!name) {
                showAlert('Please enter your name, email, and password.');
                return;
            }
            showAlert('Sign up submitted. This is a demo page only.');
        });
    </script>
</body>
</html>
