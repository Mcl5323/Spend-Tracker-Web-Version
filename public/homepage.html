<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Spend Tracker</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ── Nav bar ─────────────────────────────────────────────────── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: linear-gradient(135deg, #2e7be5, #1e3a8a);
            color: white;
        }
        header h1 { font-size: 22px; margin: 0; }
        #user-info { font-size: 14px; opacity: 0.9; }
        #logout-btn {
            background: rgba(255,255,255,0.2);
            border: 1px solid rgba(255,255,255,0.4);
            color: white; padding: 6px 14px;
            border-radius: 8px; cursor: pointer;
            font-size: 13px; margin-left: 12px;
            transition: background 0.2s;
        }
        #logout-btn:hover { background: rgba(255,255,255,0.35); }
        #export-btn {
            background: #28a745; border: none;
            color: white; padding: 8px 16px;
            border-radius: 8px; cursor: pointer;
            font-size: 13px; font-weight: bold;
            margin-left: 8px; transition: background 0.2s;
        }
        #export-btn:hover { background: #218838; }
        .header-right { display: flex; align-items: center; }

        /* ── Toast ───────────────────────────────────────────────────── */
        #toast {
            position: fixed; bottom: 24px; right: 24px;
            background: #1e3a8a; color: white;
            padding: 12px 20px; border-radius: 10px;
            font-size: 14px; display: none;
            box-shadow: 0 6px 20px rgba(0,0,0,0.2);
            z-index: 9999;
        }
        #toast.success { background: #28a745; }
        #toast.error   { background: #dc3545; }

        /* ── Spinner ─────────────────────────────────────────────────── */
        .spinner {
            display: inline-block; width: 14px; height: 14px;
            border: 2px solid #fff; border-top-color: transparent;
            border-radius: 50%; animation: spin 0.6s linear infinite;
            margin-right: 6px; vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Summary bar ─────────────────────────────────────────────── */
        .summary-bar {
            display: flex; gap: 16px; padding: 12px 20px;
            background: #fff; border-bottom: 1px solid #ddd;
            flex-wrap: wrap; align-items: center;
        }
        .summary-card {
            flex: 1; min-width: 130px;
            background: #f0f4ff; border-radius: 10px;
            padding: 12px 16px; text-align: center;
        }
        .summary-card .label { font-size: 12px; color: #555; margin-bottom: 4px; }
        .summary-card .value { font-size: 18px; font-weight: bold; color: #1e3a8a; }

        /* ── AI Insight button ───────────────────────────────────────── */
        #ai-insight-btn {
            flex: 0 0 auto;
            background: linear-gradient(135deg, #7c3aed, #4f46e5);
            border: none; color: white;
            padding: 10px 18px; border-radius: 10px;
            cursor: pointer; font-size: 14px; font-weight: bold;
            white-space: nowrap; transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 4px 12px rgba(79,70,229,0.35);
        }
        #ai-insight-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
        #ai-insight-btn:disabled { opacity: 0.55; cursor: not-allowed; }

        /* ── AI Smart Add panel ──────────────────────────────────────── */
        .ai-add-panel {
            margin: 16px 20px 0;
            background: linear-gradient(135deg, #eef2ff, #f5f3ff);
            border: 1px solid #c7d2fe;
            border-radius: 14px;
            padding: 16px 20px;
        }
        .ai-add-label {
            font-size: 13px; font-weight: bold;
            color: #4338ca; margin-bottom: 10px;
            display: flex; align-items: center; gap: 6px;
        }
        .ai-add-label span { font-weight: normal; color: #6366f1; font-size: 12px; }
        .ai-add-row { display: flex; gap: 10px; align-items: stretch; }
        #ai-text-input {
            flex: 1; padding: 12px 16px;
            border: 1px solid #a5b4fc; border-radius: 10px;
            font-size: 14px; outline: none;
            resize: none; height: 48px;
            background: white; font-family: inherit;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #ai-text-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
        }
        #ai-add-btn {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            border: none; color: white;
            padding: 0 20px; border-radius: 10px;
            cursor: pointer; font-size: 14px; font-weight: bold;
            white-space: nowrap; transition: opacity 0.2s, transform 0.15s;
            box-shadow: 0 4px 12px rgba(99,102,241,0.35);
        }
        #ai-add-btn:hover:not(:disabled) { opacity: 0.88; transform: translateY(-1px); }
        #ai-add-btn:disabled { opacity: 0.55; cursor: not-allowed; }
        .ai-hint { font-size: 12px; color: #6366f1; margin-top: 8px; opacity: 0.8; }

        /* ── Section divider ─────────────────────────────────────────── */
        .section-divider {
            display: flex; align-items: center; gap: 12px;
            padding: 12px 20px 0; color: #999; font-size: 12px;
        }
        .section-divider::before,
        .section-divider::after {
            content: ''; flex: 1; border-top: 1px solid #e0e0e0;
        }

        /* ── AI Insight modal ────────────────────────────────────────── */
        #insight-modal .modal-content {
            max-width: 480px; text-align: left; width: 90%;
        }
        #insight-modal .modal-content h2 {
            margin-bottom: 16px; font-size: 18px; color: #1e3a8a;
        }
        #insight-body {
            background: #f8f9ff;
            border: 1px solid #c7d2fe; border-radius: 10px;
            padding: 16px; font-size: 15px;
            line-height: 1.8; color: #333;
            min-height: 80px; white-space: pre-wrap;
        }
        #insight-body.loading {
            color: #999; font-style: italic;
            display: flex; align-items: center; gap: 8px;
        }
        .insight-spinner {
            display: inline-block; width: 16px; height: 16px;
            border: 2px solid #a5b4fc; border-top-color: #4f46e5;
            border-radius: 50%; animation: spin 0.7s linear infinite;
            flex-shrink: 0;
        }
        .insight-meta {
            font-size: 12px; color: #888;
            margin-top: 10px; text-align: right;
        }
        #insight-close-btn {
            margin-top: 16px; background: #4f46e5;
            color: white; border: none;
            padding: 10px 24px; border-radius: 10px;
            cursor: pointer; font-size: 14px; font-weight: bold;
            display: block; width: 100%; transition: background 0.2s;
        }
        #insight-close-btn:hover { background: #4338ca; }

        @media (max-width: 600px) {
            .ai-add-row  { flex-direction: column; }
            #ai-add-btn  { padding: 12px; }
            #ai-insight-btn { width: 100%; text-align: center; }
        }
    </style>
</head>
<body>

<!-- ── Header ──────────────────────────────────────────────────────────────── -->
<header>
    <h1>💰 Spend Tracker</h1>
    <div class="header-right">
        <span id="user-info">Loading…</span>
        <button id="export-btn" title="Download CSV">⬇ Export CSV</button>
        <button id="logout-btn">Logout</button>
    </div>
</header>

<!-- ── Summary bar + AI Insight 按钮 ────────────────────────────────────────── -->
<div class="summary-bar">
    <div class="summary-card">
        <div class="label">Total Spent</div>
        <div class="value" id="summary-total">RM 0.00</div>
    </div>
    <div class="summary-card">
        <div class="label">This Month</div>
        <div class="value" id="summary-month">RM 0.00</div>
    </div>
    <div class="summary-card">
        <div class="label">Entries</div>
        <div class="value" id="summary-count">0</div>
    </div>
    <button id="ai-insight-btn">🤖 AI 财务诊断</button>
</div>

<!-- ── ✨ AI 智能记账区域 ─────────────────────────────────────────────────────── -->
<div class="ai-add-panel">
    <div class="ai-add-label">
        ✨ 智能记账
        <span>— 用一句话描述你的消费，AI 自动识别</span>
    </div>
    <div class="ai-add-row">
        <textarea id="ai-text-input"
            placeholder="例如：今天下午喝咖啡花了 12 块钱..."></textarea>
        <button id="ai-add-btn">✨ 智能记账</button>
    </div>
    <div class="ai-hint">💡 支持中文自然语言，自动识别金额、分类和日期</div>
</div>

<!-- ── 分隔线 ────────────────────────────────────────────────────────────────── -->
<div class="section-divider">或者手动填写</div>

<!-- ── 手动记账表单 ──────────────────────────────────────────────────────────── -->
<div class="form-group">
    <input type="text"   id="expense-name"     placeholder="Expense Name">
    <input type="number" id="expense-amount"   placeholder="Amount (RM)" min="0.01" step="0.01">
    <select id="expense-category">
        <option value="" disabled selected>Select Category</option>
        <option value="Food">Food</option>
        <option value="Transport">Transport</option>
        <option value="Entertainment">Entertainment</option>
        <option value="Utilities">Utilities</option>
        <option value="Others">Others</option>
    </select>
    <input type="date" id="expense-date">
    <button id="add-expense" disabled>Add Expense</button>
</div>

<!-- ── Filter + total ───────────────────────────────────────────────────────── -->
<div class="filter-group">
    <div>
        <label for="category-filter">Filter by Category:</label>
        <select id="category-filter">
            <option value="">All Categories</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Others">Others</option>
        </select>
    </div>
    <div class="total">Total: RM<span id="total-expense">0.00</span></div>
</div>

<!-- ── Expense table ────────────────────────────────────────────────────────── -->
<div>
    <table>
        <thead>
            <tr>
                <th>Expense</th>
                <th>Amount</th>
                <th>Category</th>
                <th>Date</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody id="expense-table"></tbody>
    </table>
</div>

<!-- ── Edit modal ───────────────────────────────────────────────────────────── -->
<div id="edit-modal" class="modal">
    <div class="modal-content">
        <h2>Edit Expense</h2>
        <input type="text"   id="edit-expense-name"     placeholder="Expense Name">
        <input type="number" id="edit-expense-amount"   placeholder="Amount (RM)" min="0.01" step="0.01">
        <select id="edit-expense-category">
            <option value="" disabled selected>Select Category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Others">Others</option>
        </select>
        <input type="date" id="edit-expense-date">
        <button class="confirm-btn" id="confirm-edit">Save Changes</button>
        <button class="cancel-btn" onclick="closeModal('edit-modal')">Cancel</button>
    </div>
</div>

<!-- ── Delete modal ─────────────────────────────────────────────────────────── -->
<div id="delete-modal" class="modal">
    <div class="modal-content">
        <h2>Confirm Delete</h2>
        <p>Are you sure you want to delete this expense?</p>
        <button class="confirm-btn" id="confirm-delete">Yes, Delete</button>
        <button class="cancel-btn" onclick="closeModal('delete-modal')">Cancel</button>
    </div>
</div>

<!-- ── AI Insight modal ──────────────────────────────────────────────────────── -->
<div id="insight-modal" class="modal">
    <div class="modal-content">
        <h2>🤖 AI 月度财务诊断</h2>
        <div id="insight-body" class="loading">
            <span class="insight-spinner"></span> AI 正在分析你的消费数据…
        </div>
        <div class="insight-meta" id="insight-meta"></div>
        <button id="insight-close-btn" onclick="closeModal('insight-modal')">关闭</button>
    </div>
</div>

<!-- ── Toast ─────────────────────────────────────────────────────────────────── -->
<div id="toast"></div>

<script>
// ─── Config ──────────────────────────────────────────────────────────────────
const API = 'api/expenses.php';

// ─── Auth guard ───────────────────────────────────────────────────────────────
const userId   = sessionStorage.getItem('userId');
const userName = sessionStorage.getItem('userName');
if (!userId) window.location.href = 'index.html';
document.getElementById('user-info').textContent = `👤 ${userName}`;

// ─── Logout ───────────────────────────────────────────────────────────────────
document.getElementById('logout-btn').addEventListener('click', () => {
    sessionStorage.clear();
    window.location.href = 'index.html';
});

// ─── Toast ────────────────────────────────────────────────────────────────────
function toast(msg, type = 'success') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className = type;
    el.style.display = 'block';
    setTimeout(() => el.style.display = 'none', 3500);
}

// ─── API helper ───────────────────────────────────────────────────────────────
async function apiPost(payload) {
    const res = await fetch(API, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ userId, ...payload }),
    });
    return res.json();
}

// ─── Modal helpers ────────────────────────────────────────────────────────────
function openModal(id)  { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// ─── Enable add button when manual form is filled ────────────────────────────
const addBtn = document.getElementById('add-expense');
const formInputIds = ['expense-name','expense-amount','expense-category','expense-date'];
formInputIds.forEach(id => {
    document.getElementById(id).addEventListener('input', () => {
        addBtn.disabled = !formInputIds.every(i => document.getElementById(i).value);
    });
});
document.getElementById('expense-date').valueAsDate = new Date();

// ─── Load & render expenses ───────────────────────────────────────────────────
let allExpenses = [];

async function loadExpenses() {
    const category = document.getElementById('category-filter').value;
    const data = await apiPost({ action: 'get', category });
    if (data.success) {
        allExpenses = data.expenses;
        renderTable(allExpenses);
        updateSummary(allExpenses);
    }
}

function renderTable(expenses) {
    const tbody = document.getElementById('expense-table');
    let total = 0;

    if (expenses.length === 0) {
        tbody.innerHTML = `<tr><td colspan="5" class="empty-table-message">No expenses recorded yet.</td></tr>`;
        document.getElementById('total-expense').textContent = '0.00';
        return;
    }

    tbody.innerHTML = expenses.map(e => {
        total += parseFloat(e.amount);
        const aiTag = e.source === 'ai'
            ? '<span style="font-size:10px;background:#ede9fe;color:#6d28d9;padding:1px 6px;border-radius:6px;margin-left:4px;">AI</span>'
            : '';
        return `
        <tr>
            <td>${escHtml(e.name)}${aiTag}</td>
            <td>RM ${parseFloat(e.amount).toFixed(2)}</td>
            <td><span class="cat-badge cat-${e.category.toLowerCase()}">${escHtml(e.category)}</span></td>
            <td>${e.date}</td>
            <td class="actions">
                <button class="edit-btn"   onclick="openEdit('${e.id}')">✏️</button>
                <button class="delete-btn" onclick="openDelete('${e.id}')">🗑️</button>
            </td>
        </tr>`;
    }).join('');

    document.getElementById('total-expense').textContent = total.toFixed(2);
}

function updateSummary(expenses) {
    const total = expenses.reduce((s, e) => s + parseFloat(e.amount), 0);
    const now   = new Date();
    const month = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}`;
    const monthTotal = expenses
        .filter(e => e.date.startsWith(month))
        .reduce((s, e) => s + parseFloat(e.amount), 0);

    document.getElementById('summary-total').textContent = `RM ${total.toFixed(2)}`;
    document.getElementById('summary-month').textContent = `RM ${monthTotal.toFixed(2)}`;
    document.getElementById('summary-count').textContent = expenses.length;
}

function escHtml(str) {
    return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ─── Category filter ─────────────────────────────────────────────────────────
document.getElementById('category-filter').addEventListener('change', loadExpenses);

// ─── Manual add expense ───────────────────────────────────────────────────────
document.getElementById('add-expense').addEventListener('click', async () => {
    const name     = document.getElementById('expense-name').value.trim();
    const amount   = parseFloat(document.getElementById('expense-amount').value);
    const category = document.getElementById('expense-category').value;
    const date     = document.getElementById('expense-date').value;

    addBtn.innerHTML = '<span class="spinner"></span> Adding…';
    addBtn.disabled = true;

    const data = await apiPost({ action: 'add', name, amount, category, date });
    if (data.success) {
        formInputIds.forEach(id => document.getElementById(id).value = '');
        document.getElementById('expense-date').valueAsDate = new Date();
        toast('Expense added!');
        await loadExpenses();
    } else {
        toast(data.message, 'error');
    }
    addBtn.textContent = 'Add Expense';
    // 重置后按钮应保持 disabled，直到表单再次填满
    addBtn.disabled = true;
});

// ─── ✨ AI Smart Add ──────────────────────────────────────────────────────────
document.getElementById('ai-add-btn').addEventListener('click', async () => {
    const text = document.getElementById('ai-text-input').value.trim();
    if (!text) {
        toast('请先输入消费描述哦～', 'error');
        return;
    }

    const btn = document.getElementById('ai-add-btn');
    btn.innerHTML = '<span class="spinner"></span> 解析中…';
    btn.disabled = true;

    try {
        const data = await apiPost({ action: 'ai_add', text });
        if (data.success) {
            document.getElementById('ai-text-input').value = '';
            const e = data.expense;
            toast(`✨ 已记录：${e.name}  RM ${parseFloat(e.amount).toFixed(2)} · ${e.category}`);
            await loadExpenses();
        } else {
            toast(data.message || 'AI 解析失败，请重试或手动填写。', 'error');
        }
    } catch (err) {
        toast('网络错误，请检查 PHP 服务是否运行。', 'error');
    }

    btn.textContent = '✨ 智能记账';
    btn.disabled = false;
});

// ─── 🤖 AI Insight ───────────────────────────────────────────────────────────
document.getElementById('ai-insight-btn').addEventListener('click', async () => {
    const body      = document.getElementById('insight-body');
    const meta      = document.getElementById('insight-meta');
    const insightBtn = document.getElementById('ai-insight-btn');

    // 重置为 loading 状态再打开 Modal
    body.className = 'loading';
    body.innerHTML = '<span class="insight-spinner"></span> AI 正在分析你的消费数据…';
    meta.textContent = '';
    openModal('insight-modal');
    insightBtn.disabled = true;

    try {
        const data = await apiPost({ action: 'ai_insight' });
        body.className = '';
        if (data.success) {
            body.textContent = data.insight;
            meta.textContent = data.meta || '';
        } else {
            body.textContent = '⚠️ ' + (data.message || 'AI 诊断暂时不可用，请稍后再试。');
        }
    } catch (err) {
        body.className = '';
        body.textContent = '⚠️ 网络错误，请检查 PHP 服务是否运行。';
    }

    insightBtn.disabled = false;
});

// ─── Edit modal ───────────────────────────────────────────────────────────────
let editingId = null;

function openEdit(id) {
    const exp = allExpenses.find(e => e.id === id);
    if (!exp) return;
    editingId = id;
    document.getElementById('edit-expense-name').value     = exp.name;
    document.getElementById('edit-expense-amount').value   = exp.amount;
    document.getElementById('edit-expense-category').value = exp.category;
    document.getElementById('edit-expense-date').value     = exp.date;
    openModal('edit-modal');
}

document.getElementById('confirm-edit').addEventListener('click', async () => {
    const name     = document.getElementById('edit-expense-name').value.trim();
    const amount   = parseFloat(document.getElementById('edit-expense-amount').value);
    const category = document.getElementById('edit-expense-category').value;
    const date     = document.getElementById('edit-expense-date').value;

    const data = await apiPost({ action: 'edit', expenseId: editingId, name, amount, category, date });
    if (data.success) {
        closeModal('edit-modal');
        toast('Expense updated!');
        await loadExpenses();
    } else {
        toast(data.message, 'error');
    }
});

// ─── Delete modal ─────────────────────────────────────────────────────────────
let deletingId = null;

function openDelete(id) {
    deletingId = id;
    openModal('delete-modal');
}

document.getElementById('confirm-delete').addEventListener('click', async () => {
    const data = await apiPost({ action: 'delete', expenseId: deletingId });
    if (data.success) {
        closeModal('delete-modal');
        toast('Expense deleted.', 'error');
        await loadExpenses();
    } else {
        toast(data.message, 'error');
    }
});

// ─── CSV Export ───────────────────────────────────────────────────────────────
document.getElementById('export-btn').addEventListener('click', () => {
    const rows = [['Name','Amount (RM)','Category','Date']];
    allExpenses.forEach(e => rows.push([
        e.name, parseFloat(e.amount).toFixed(2), e.category, e.date
    ]));
    const csv  = rows.map(r => r.map(c => `"${String(c).replace(/"/g,'""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const a    = document.createElement('a');
    a.href     = URL.createObjectURL(blob);
    a.download = `expenses_${new Date().toISOString().slice(0,10)}.csv`;
    a.click();
    toast('CSV downloaded!');
});

// ─── Init ─────────────────────────────────────────────────────────────────────
loadExpenses();
</script>
</body>
</html>
