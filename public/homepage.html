<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Spend Tracker </title>
    <link rel="stylesheet" href="style.css">
</head>
<style>
    body {
        font-family: 'Arial', sans-serif;
        text-align: center;
        padding: 20px;
    }
</style>
<body>
    <h1>Welcome to Spend Tracker</h1>
    <p>Track your expenses, manage budgets, and stay on top of your money.</p>
<!-- Modify the font -->

    <div class="form-group">
        <input type="text" id="expense-name"
        placeholder="Expense Name">
        <input type="number" id="expense-amount"
        placeholder="Amount">
        <select id="expense-category">
            <option value="" disabled selected>Select Category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Others">Others</option>
        </select>
        <input type="date" id="expense-date">
        <button id="add-expense" disabled> Add Expense</button>
    </div>

    <div>
        <table>
            <thead>
                <tr>
                    <th>Expenses</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="expense-table"></tbody>
        </table>
    </div>

    <div class="filter-group">
        <div>
            <label for="category-filter">Filter by Category:</label>
            <select id="category-filter">
                <option value="">All Categories</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Utilities">Utilities</option>
                <option value="Others">Others</option>
            </select>

            <div class ="total"></div>
                 Total: RM<span id="total-expense">0.00</span>
        </div>
    </div>

    <!--edit pop up-->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <h2>Edit Expense </h2>
            <input type="text" id="edit-expense-name"
        placeholder="Expense Name">
        <input type="number" id="edit-expense-amount"
        placeholder="Amount">
        <select id="edit-expense-category">
            <option value="" disabled selected>Select Category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Others">Others</option>
        </select>
        <input type="date" id="edit-expense-date">
        <button class="confirm-btn"
        id="confirm-edit">Save Changes</button>
        <button class="cancel-btn"
        onclick="closeModal('edit-modal')">Cancel</button>
        </div>
    </div>

<!-- Delete popup -->
 <div id="delete-modal" class="modal">
    <h2>Confirm Delete</h2>
    <p>Are you sure you want to delete this expense?</p>
    <button class="confirm-btn" id="confirm-delete">Yes, Delete</button>
    <button class="cancel-btn" onclick="closeModal('delete-modal')">Cancel</button>
 </div>

</body>
</html>

</html>
