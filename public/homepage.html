<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home - Spend Tracker </title>
</head>
<body>
    <h1>Welcome to Spend Tracker</h1>
    <p>Track your expenses, manage budgets, and stay on top of your money.</p>
<!-- Modify the font -->
    <style>
        body {
            font-family: "Goudy Bookletter 1911", sans-serif;
            color: #333;
            background: #f4f7fb;
            margin: 0;
            padding: 60px;
            text-align: center;
        }
        h1 {
            font-size: 36px;
            margin-bottom: 20px;
        }
        p {
            font-size: 16px;
            opacity: 0.8;
        }
    </style>
    <div class="form-group">
        <input type="text" id="expense-name"
        placeholder="Expense Name">
        <input type="number" id="expense-amount"
        placeholder="Amount">
        <select id="expense-category">
            <option value="" disabled selected>Select Category</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Entertainment">Entertainment</option>
            <option value="Utilities">Utilities</option>
            <option value="Others">Others</option>
        </select>
        <input type="date" id="expense-date">
        <button id="add-expense" disabled> Add Expense</button>
    </div>

    <div>
        <table>
            <thead>
                <tr>
                    <th>Expenses</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody id="expense-table"></tbody>
        </table>
    </div>

    <div class="filter-group">
        <div>
            <label for="category-filter">Filter by Category:</label>
            <select id="category-filter">
                <option value="">All Categories</option>
                <option value="Food">Food</option>
                <option value="Transport">Transport</option>
                <option value="Entertainment">Entertainment</option>
                <option value="Utilities">Utilities</option>
                <option value="Others">Others</option>
            </select>
        </div>
    </div>

</body>
</html>

</html>
